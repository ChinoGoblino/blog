{{ define "main" }}
<article class="single-page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
  <p class="last-updated">Last updated: <time datetime="{{ .Lastmod.Format "2006-01-02" }}">{{ .Lastmod.Format "2006-01-02" }}</time></p>
</article>
{{ end }}
