{{ define "main" }}
<article>
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      {{ with .GetTerms "tags" }}
      <div class="post-tags">
        {{ range . }}<a href="{{ .Permalink }}" class="tag">{{ .LinkTitle }}</a>{{ end }}
      </div>
      {{ end }}
    </div>
  </header>

  {{ $headings := findRE "<h[2-4][^>]*>" .Content }}
  {{ if ge (len $headings) 3 }}
  <nav class="toc">
    <span class="toc-label">Contents</span>
    {{ .TableOfContents }}
  </nav>
  {{ end }}

  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
